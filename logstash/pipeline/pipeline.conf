input {
  jdbc {
    # MySQL 컨테이너의 DNS 이름과 데이터베이스 포트를 사용합니다.
    jdbc_connection_string => "jdbc:mysql://mysql:3306/logs?autoReconnect=true"
    jdbc_user => "logstash"
    jdbc_password => "1234"
    # Logstash 컨테이너 내부에 마운트한 MySQL JDBC 드라이버 경로입니다.
    jdbc_driver_library => "/usr/share/logstash/mysql-connector-java.jar"
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    use_column_value => true
    # 주기적으로 실행할 SQL 쿼리 (예시: 변경된 데이터만 가져오기)
    statement => "SELECT *, UNIX_TIMESTAMP(updated_at) AS tracking_value FROM account WHERE UNIX_TIMESTAMP(updated_at) > :sql_last_value"
    tracking_column => "tracking_value"

    # 마지막 실행 시각을 저장할 파일 (Logstash 컨테이너 내부 경로)
    last_run_metadata_path => "/usr/share/logstash/last_run_metadata.yml"

    # 크론 스케줄: 5초 마다 실행
    schedule => "*/5 * * * * *"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Elasticsearch 인덱스 이름 (원하는 이름으로 변경 가능)
    index => "logs_index"
    # MySQL 테이블의 고유 식별자를 사용해 중복 방지 (필드명에 맞게 변경)
    document_id => "%{id}"
  }

  # 디버깅 용으로 콘솔 출력 (옵션)
  stdout { codec => rubydebug }
}
